name: Serving Contract Gates

on:
  push:
    branches: [main, develop]
    paths:
      - ipfs_accelerate_py/**
      - test/api/test_serving_call_matrix_enforcement.py
      - test/api/test_task_worker_backend_manager_required.py
      - test/api/test_serving_readiness_contracts.py
      - test/api/test_serving_e2e_call_chain_ordering.py
      - scripts/validation/run_serving_contract_gates.sh
      - .github/workflows/serving-contract-gates.yml
      - requirements*.txt
      - pyproject.toml
  pull_request:
    branches: [main]
    paths:
      - ipfs_accelerate_py/**
      - test/api/test_serving_call_matrix_enforcement.py
      - test/api/test_task_worker_backend_manager_required.py
      - test/api/test_serving_readiness_contracts.py
      - test/api/test_serving_e2e_call_chain_ordering.py
      - scripts/validation/run_serving_contract_gates.sh
      - .github/workflows/serving-contract-gates.yml
      - requirements*.txt
      - pyproject.toml
  workflow_dispatch:

jobs:
  serving-contract-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[testing]"

      - name: Run serving contract validation gates
        env:
          PYTHON_BIN: python
        run: bash scripts/validation/run_serving_contract_gates.sh
